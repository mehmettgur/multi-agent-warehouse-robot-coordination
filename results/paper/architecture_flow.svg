<svg xmlns='http://www.w3.org/2000/svg' width='1240' height='860' viewBox='0 0 1240 860'><rect width='100%' height='100%' fill='#ffffff'/><text x='48' y='34' font-size='26' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>End-to-End System Architecture and Tick-Level Control/Data Flow</text><text x='48' y='58' font-size='12' font-family='Arial, sans-serif' fill='#475569'>Architecture reconstructed directly from the implemented simulator, coordination logic, and experiment pipeline.</text><text x='48' y='92' font-size='18' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>A. High-Level System Architecture</text><rect x='48' y='120' width='212' height='128' rx='18' fill='#f8fafc' stroke='#cbd5e1' stroke-width='1.6'/><text x='64' y='146' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Scenario Config</text><text x='64' y='170' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>JSON scenario files</text><text x='64' y='186' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>grid, robots, tasks, stations</text><text x='64' y='202' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>planner, allocator, events, seed</text><rect x='304' y='120' width='230' height='128' rx='18' fill='#f8fafc' stroke='#cbd5e1' stroke-width='1.6'/><text x='320' y='146' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Loader + Simulator</text><text x='320' y='170' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>load_scenario(...)</text><text x='320' y='186' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>run_simulation(...)</text><text x='320' y='202' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>build GridMap / RobotState / TaskState</text><rect x='578' y='108' width='304' height='152' rx='18' fill='#ecfeff' stroke='#67e8f9' stroke-width='1.6'/><text x='594' y='134' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#155e75'>CoordinatorAgent</text><text x='594' y='158' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>tick loop orchestration</text><text x='594' y='174' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>policy dispatch (baseline / coordinated)</text><text x='594' y='190' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>conflict handling + task progress + stop condition</text><rect x='926' y='120' width='266' height='128' rx='18' fill='#f8fafc' stroke='#cbd5e1' stroke-width='1.6'/><text x='942' y='146' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Outputs</text><text x='942' y='170' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>RunResult + TickSnapshot timeline</text><text x='942' y='186' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>MetricsReport</text><text x='942' y='202' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>paper CSV / LaTeX / SVG exports</text><rect x='524' y='300' width='198' height='110' rx='18' fill='#fefce8' stroke='#fde68a' stroke-width='1.6'/><text x='540' y='326' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#854d0e'>TaskAllocatorAgent</text><text x='540' y='350' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>greedy or hungarian</text><text x='540' y='366' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>assign idle robots to released tasks</text><rect x='752' y='300' width='220' height='110' rx='18' fill='#eff6ff' stroke='#bfdbfe' stroke-width='1.6'/><text x='768' y='326' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#1d4ed8'>TrafficManagerAgent</text><text x='768' y='350' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>prioritized planning</text><text x='768' y='366' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>reservation table</text><text x='768' y='382' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>dynamic priority / micro-replan</text><rect x='1002' y='300' width='190' height='110' rx='18' fill='#f5f3ff' stroke='#ddd6fe' stroke-width='1.6'/><text x='1018' y='326' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#6d28d9'>RobotAgent(s)</text><text x='1018' y='350' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>consume plan</text><text x='1018' y='366' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>emit MOVE / WAIT</text><rect x='274' y='300' width='220' height='110' rx='18' fill='#fff7ed' stroke='#fed7aa' stroke-width='1.6'/><text x='290' y='326' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#9a3412'>EventEngine</text><text x='290' y='350' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>temp_block</text><text x='290' y='366' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>stochastic_delay</text><text x='290' y='382' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>active blocked cells / forced waits</text><rect x='48' y='300' width='196' height='110' rx='18' fill='#f8fafc' stroke='#cbd5e1' stroke-width='1.6'/><text x='64' y='326' font-size='16' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>MetricsCollector</text><text x='64' y='350' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>makespan, throughput, waits</text><text x='64' y='366' font-size='11.5' font-family='Arial, sans-serif' fill='#334155'>conflicts, replans, heatmap</text><line x1='260' y1='184' x2='304' y2='184' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='304,184 294,179 294,189' fill='#64748b'/><line x1='534' y1='184' x2='578' y2='184' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='578,184 568,179 568,189' fill='#64748b'/><line x1='882' y1='184' x2='926' y2='184' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='926