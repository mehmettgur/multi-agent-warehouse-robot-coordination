' stroke='#e2e8f0'/><rect x='72' y='548' width='326' height='58' rx='16' fill='#fff7ed' stroke='#f97316' stroke-width='1.4'/><circle cx='92' cy='568' r='12' fill='#f97316'/><text x='92' y='572' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>1</text><text x='114' y='572' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Update events and task state</text><rect x='430' y='548' width='326' height='58' rx='16' fill='#fefce8' stroke='#eab308' stroke-width='1.4'/><circle cx='450' cy='568' r='12' fill='#eab308'/><text x='450' y='572' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>2</text><text x='472' y='572' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Allocate released tasks</text><rect x='788' y='548' width='372' height='58' rx='16' fill='#eff6ff' stroke='#3b82f6' stroke-width='1.4'/><circle cx='808' cy='568' r='12' fill='#3b82f6'/><text x='808' y='572' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>3</text><text x='830' y='572' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Plan intents (independent or reserved)</text><rect x='72' y='632' width='326' height='58' rx='16' fill='#fff7ed' stroke='#f97316' stroke-width='1.4'/><circle cx='92' cy='652' r='12' fill='#f97316'/><text x='92' y='656' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>4</text><text x='114' y='656' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Apply delays and blocked-cell overrides</text><rect x='430' y='632' width='326' height='58' rx='16' fill='#f5f3ff' stroke='#8b5cf6' stroke-width='1.4'/><circle cx='450' cy='652' r='12' fill='#8b5cf6'/><text x='450' y='656' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>5</text><text x='472' y='656' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Detect conflicts and local micro-replan</text><rect x='788' y='632' width='372' height='58' rx='16' fill='#ecfeff' stroke='#06b6d4' stroke-width='1.4'/><circle cx='808' cy='652' r='12' fill='#06b6d4'/><text x='808' y='656' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>6</text><text x='830' y='656' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Fallback: lower-priority robots WAIT</text><rect x='256' y='716' width='326' height='58' rx='16' fill='#ecfccb' stroke='#65a30d' stroke-width='1.4'/><circle cx='276' cy='736' r='12' fill='#65a30d'/><text x='276' y='740' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>7</text><text x='298' y='740' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Execute MOVE / WAIT and update positions</text><rect x='612' y='716' width='326' height='58' rx='16' fill='#f8fafc' stroke='#64748b' stroke-width='1.4'/><circle cx='632' cy='736' r='12' fill='#64748b'/><text x='632' y='740' text-anchor='middle' font-size='11' font-family='Arial, sans-serif' font-weight='700' fill='#ffffff'>8</text><text x='654' y='740' font-size='12.5' font-family='Arial, sans-serif' font-weight='700' fill='#0f172a'>Record snapshot, metrics, and stop if done</text><line x1='398' y1='577' x2='430' y2='577' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='430,577 420,572 420,582' fill='#64748b'/><line x1='756' y1='577' x2='788' y2='577' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='788,577 778,572 778,582' fill='#64748b'/><line x1='974' y1='606' x2='974' y2='632' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='974,632 964,627 964,637' fill='#64748b'/><line x1='788' y1='661' x2='756' y2='661' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='756,661 746,656 746,666' fill='#64748b'/><line x1='430' y1='661' x2='398' y2='661' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='398,661 388,656 388,666' fill='#64748b'/><line x1='235' y1='690' x2='235' y2='716' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='235,716 225,711 225,721' fill='#64748b'/><line x1='582' y1='745' x2='612' y2='745' stroke='#64748b' stroke-width='2' stroke-linecap='round'/><polygon points='612,745 602,740 602,750' fill='#64748b'/><text x='72' y='790' font-size='12' font-family='Arial, sans-serif' fill='#475569'>Core control loop in implementation: sense/update - assign - plan - resolve - act - record.</text><text x='72' y='808' font-size='12' font-family='Arial, sans-serif' fill='#475569'>Full coordinated mode uses reservation-based planning, optional dynamic priority, and localized replanning before deterministic WAIT fallback.</text></svg>